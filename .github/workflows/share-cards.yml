# Regenerates the per-event share stubs (e/<id>.html) so shared links
# unfurl into real cards. Scheduled ~20 minutes after the event imports
# in the app repo (10:00 & 17:00 UTC) so fresh events get stubs same-day.
name: Share cards

on:
  schedule:
    - cron: '20 10,17 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/share-cards.mjs
      - name: Commit if changed
        run: |
          git config user.name "30a-now-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A e
          git diff --cached --quiet || git commit -m "Refresh event share cards"
          git push
